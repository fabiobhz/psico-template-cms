<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--
    ╔══════════════════════════════════════════════════════════════╗
    ║  FAGOM PROFESSIONAL TEMPLATE                                 ║
    ║  Configure the sections below before publishing your site.   ║
    ╚══════════════════════════════════════════════════════════════╝
  -->

  <!-- ─── PRIMARY META TAGS (fallback — updated dynamically by the CMS) ─── -->
  <title>Site Name</title>
  <meta name="description" content="A brief description of your site for search engines." />
  <meta name="keywords"    content="keyword 1, keyword 2, keyword 3" />
  <meta name="author"      content="Site Name" />
  <meta name="robots"      content="index, follow" />
  <meta name="theme-color" content="#5C7A5C" />

  <!-- ─── OPEN GRAPH / FACEBOOK ─── -->
  <meta property="og:type"        content="website" />
  <meta property="og:locale"      content="en_US" />
  <meta property="og:url"         content="https://yourdomain.com/" />
  <meta property="og:site_name"   content="Site Name" />
  <meta property="og:title"       content="Site Name" />
  <meta property="og:description" content="A brief description of your site for search engines." />
  <!--
    OG Image: replace the placeholder below with a 1200×630 px image hosted on your domain.
    <meta property="og:image"        content="https://yourdomain.com/assets/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Site Name" />
  -->

  <!-- ─── TWITTER CARD ─── -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Site Name" />
  <meta name="twitter:description" content="A brief description of your site for search engines." />
  <!--
    <meta name="twitter:image" content="https://yourdomain.com/assets/og-image.png" />
  -->

  <!-- ─── CANONICAL URL (update before publishing) ─── -->
  <!--
    <link rel="canonical" href="https://yourdomain.com/" />
  -->

  <!-- ─── GOOGLE SEARCH CONSOLE VERIFICATION (optional) ─── -->
  <!--
    <meta name="google-site-verification" content="YOUR_VERIFICATION_CODE" />
  -->

  <!-- ─── GOOGLE ADS / GTAG (optional — paste your own Measurement ID) ─── -->
  <!--
    Replace "G-XXXXXXXXXX" with your own Google Ads or GA4 Measurement ID.

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Consent Mode v2: denied by default until user accepts cookie banner
      gtag('consent', 'default', {
        'ad_storage':         'denied',
        'ad_user_data':       'denied',
        'ad_personalization': 'denied',
        'analytics_storage':  'denied',
        'wait_for_update':    500
      });

      gtag('js', new Date());
      gtag('config', 'G-XXXXXXXXXX');
    </script>
  -->

  <!-- ─── PERFORMANCE: PRECONNECT TO GOOGLE FONTS ─── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ─── FAVICON (replace with your own) ─── -->
  <!--
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon"             type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180"               href="/apple-touch-icon.png" />
    <link rel="manifest"                                        href="/site.webmanifest" />
  -->
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
