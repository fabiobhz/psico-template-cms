  <!-- Structured Data: FAQPage (gera rich snippets no Google) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Posso fazer terapia online morando no exterior?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sim! A Vínculo Psicologia oferece atendimento psicológico online para brasileiros em qualquer lugar do mundo. As sessões são realizadas por videochamada em português, com psicólogos formados pela UFMG."
        }
      },
      {
        "@type": "Question",
        "name": "Vocês atendem brasileiros fora do Brasil?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sim, nosso foco principal é oferecer psicoterapia online em português para brasileiros que moram no exterior. Entendemos os desafios da migração, adaptação cultural e os lutos da distância."
        }
      },
      {
        "@type": "Question",
        "name": "Qual abordagem terapêutica vocês utilizam?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Nossa prática clínica é orientada pela Psicanálise. Priorizamos a escuta analítica e o mergulho na subjetividade, auxiliando nossos pacientes a compreenderem suas angústias e conflitos."
        }
      },
      {
        "@type": "Question",
        "name": "Quais tipos de questões vocês tratam?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Atuamos no cuidado de ansiedade, depressão, angústia, luto, fobias, transtornos diversos, conflitos relacionais, transições de ciclo de vida (gestação, puerpério, aposentadoria) e desafios da migração."
        }
      },
      {
        "@type": "Question",
        "name": "Como funciona o atendimento online?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O atendimento é realizado por videochamada, com horários flexíveis que se adaptam a diferentes fusos horários. Entre em contato pelo nosso formulário ou WhatsApp para agendar sua primeira sessão."
        }
      }
    ]
  }
