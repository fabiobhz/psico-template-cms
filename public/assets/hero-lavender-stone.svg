<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 900" width="1920" height="900">
  <defs>
    <linearGradient id="base" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1920" y2="900">
      <stop offset="0%"   stop-color="#2E2258"/>
      <stop offset="55%"  stop-color="#3C2E6E"/>
      <stop offset="100%" stop-color="#483A7A"/>
    </linearGradient>
    <radialGradient id="vig" gradientUnits="userSpaceOnUse" cx="960" cy="450" r="1050">
      <stop offset="0%"   stop-color="transparent"/>
      <stop offset="72%"  stop-color="#2E2258" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#2E2258" stop-opacity="0.50"/>
    </radialGradient>
    <filter id="b1"><feGaussianBlur stdDeviation="95"/></filter>
    <filter id="b2"><feGaussianBlur stdDeviation="135"/></filter>
  </defs>

  <rect width="1920" height="900" fill="url(#base)"/>

  <circle cx="440"  cy="260"  r="430" fill="#7060A8" opacity="0.55" filter="url(#b2)"/>
  <circle cx="1480" cy="640"  r="390" fill="#8070A0" opacity="0.45" filter="url(#b2)"/>
  <circle cx="960"  cy="90"   r="310" fill="#9080B8" opacity="0.40" filter="url(#b1)"/>
  <circle cx="220"  cy="730"  r="270" fill="#605888" opacity="0.32" filter="url(#b1)"/>
  <circle cx="1700" cy="190"  r="280" fill="#584880" opacity="0.38" filter="url(#b1)"/>

  <line x1="0" y1="310" x2="1920" y2="310" stroke="#B0A0D0" stroke-width="0.6" opacity="0.12"/>
  <line x1="0" y1="590" x2="1920" y2="590" stroke="#B0A0D0" stroke-width="0.4" opacity="0.08"/>

  <rect width="1920" height="900" fill="url(#vig)"/>
</svg>
