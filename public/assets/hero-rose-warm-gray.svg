      <stop offset="0%"   stop-color="#3C2020"/>
      <stop offset="50%"  stop-color="#502A26"/>
      <stop offset="100%" stop-color="#5A3028"/>
    </linearGradient>
    <radialGradient id="vig" gradientUnits="userSpaceOnUse" cx="960" cy="450" r="1050">
