  <rect width="1920" height="900" fill="url(#base)"/>

  <circle cx="430"  cy="270"  r="430" fill="#906055" opacity="0.55" filter="url(#b2)"/>
  <circle cx="1500" cy="630"  r="380" fill="#806868" opacity="0.45" filter="url(#b2)"/>
  <circle cx="960"  cy="100"  r="310" fill="#C09090" opacity="0.35" filter="url(#b1)"/>
  <circle cx="200"  cy="730"  r="260" fill="#705060" opacity="0.35" filter="url(#b1)"/>
  <circle cx="1700" cy="180"  r="270" fill="#9A6870" opacity="0.32" filter="url(#b1)"/>

  <line x1="0" y1="305" x2="1920" y2="305" stroke="#D0A0A0" stroke-width="0.6" opacity="0.12"/>
  <line x1="0" y1="590" x2="1920" y2="590" stroke="#D0A0A0" stroke-width="0.4" opacity="0.08"/>

  <rect width="1920" height="900" fill="url(#vig)"/>
