  <ellipse cx="288" cy="305" rx="36" ry="145" fill="#1A0900"/>
  <ellipse cx="200" cy="375" rx="92" ry="55" fill="#1A0900"/>

  <!-- Corpo / roupa -->
  <rect x="0" y="395" width="400" height="160" fill="#1E3A38"/>
  <ellipse cx="200" cy="395" rx="200" ry="40" fill="#1E3A38"/>
  <!-- Gola em V -->
  <path d="M 152 395 L 200 450 L 248 395" fill="#162E2C"/>

  <!-- Pescoço -->
  <rect x="180" y="315" width="40" height="88" rx="9" fill="#C08868"/>

  <!-- Orelhas -->
  <ellipse cx="124" cy="252" rx="15" ry="19" fill="#B07858"/>
  <ellipse cx="276" cy="252" rx="15" ry="19" fill="#B07858"/>

  <!-- Rosto -->
  <ellipse cx="200" cy="238" rx="80" ry="96" fill="#C08868"/>

  <!-- Sombra suave queixo -->
  <ellipse cx="200" cy="325" rx="48" ry="11" fill="#9A6848" opacity="0.25"/>

  <!-- Cabelo frente / topo -->
  <ellipse cx="200" cy="152" rx="84" ry="78" fill="#1A0900"/>

