  <path d="M 153 213 Q 170 205 188 211" stroke="#1A0900" stroke-width="3.0" fill="none" stroke-linecap="round"/>
  <path d="M 212 211 Q 230 205 247 213" stroke="#1A0900" stroke-width="3.0" fill="none" stroke-linecap="round"/>

  <!-- Olhos brancos -->
  <ellipse cx="170" cy="234" rx="14.5" ry="10" fill="#F8F2EC"/>
  <ellipse cx="230" cy="234" rx="14.5" ry="10" fill="#F8F2EC"/>

  <!-- Íris -->
  <circle cx="170" cy="235" r="7" fill="#2E1808"/>
  <circle cx="230" cy="235" r="7" fill="#2E1808"/>

  <!-- Brilho olho -->
  <circle cx="173" cy="232" r="2.5" fill="white" opacity="0.78"/>
  <circle cx="233" cy="232" r="2.5" fill="white" opacity="0.78"/>

  <!-- Cílios superiores (simples) -->
  <path d="M 156 224 Q 170 220 184 224" stroke="#1A0900" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 216 224 Q 230 220 244 224" stroke="#1A0900" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Nariz -->
  <path d="M 196 258 Q 191 271 200 274 Q 209 271 204 258" stroke="#9A6040" stroke-width="1.4" fill="none" opacity="0.60"/>
  <ellipse cx="192" cy="272" rx="5" ry="3.5" fill="#9A6040" opacity="0.22"/>
  <ellipse cx="208" cy="272" rx="5" ry="3.5" fill="#9A6040" opacity="0.22"/>

  <!-- Lábios -->
  <path d="M 182 296 Q 191 290 200 292 Q 209 290 218 296" stroke="#9A5838" stroke-width="1.6" fill="none"/>
  <path d="M 182 296 Q 200 310 218 296" fill="#C07862" opacity="0.88"/>
  <path d="M 182 296 Q 200 310 218 296" stroke="#9A5838" stroke-width="1.0" fill="none"/>

  <!-- Canalinho do filtro nasal (sutil) -->
