<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Retrato 2 — Mulher, pele clara, cabelo ruivo preso em coque -->

  <!-- Mechas soltas laterais (atrás do rosto) -->
  <path d="M 130 220 Q 108 268 112 330" stroke="#7A3818" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M 270 220 Q 292 268 288 330" stroke="#7A3818" stroke-width="18" fill="none" stroke-linecap="round"/>

  <!-- Corpo / roupa -->
  <rect x="0" y="395" width="400" height="160" fill="#1E2A4A"/>
  <ellipse cx="200" cy="395" rx="200" ry="40" fill="#1E2A4A"/>
  <!-- Lapela / colarinho -->
  <path d="M 158 395 L 200 428 L 242 395" fill="#162038"/>
  <!-- Detalhe gola -->
  <path d="M 178 398 L 200 420 L 222 398" stroke="#263250" stroke-width="2" fill="none"/>

  <!-- Pescoço -->
  <rect x="181" y="315" width="38" height="88" rx="9" fill="#F0C8A8"/>

  <!-- Orelhas -->
  <ellipse cx="124" cy="250" rx="14" ry="18" fill="#E0B890"/>
  <ellipse cx="276" cy="250" rx="14" ry="18" fill="#E0B890"/>
  <!-- Brincos simples -->
  <circle cx="124" cy="258" r="4" fill="#C9A84C"/>
  <circle cx="276" cy="258" r="4" fill="#C9A84C"/>

  <!-- Rosto -->
  <ellipse cx="200" cy="235" rx="79" ry="95" fill="#F0C8A8"/>

  <!-- Sombra suave queixo -->
  <ellipse cx="200" cy="322" rx="46" ry="10" fill="#D09878" opacity="0.20"/>

  <!-- Cabelo — volume base -->
  <ellipse cx="200" cy="155" rx="84" ry="76" fill="#7A3818"/>

  <!-- Coque no topo -->
  <ellipse cx="200" cy="96"  rx="46" ry="38" fill="#7A3818"/>
  <ellipse cx="200" cy="84"  rx="38" ry="28" fill="#6A2E12"/>
  <!-- Centro do coque (espiral) -->
  <circle  cx="200" cy="90"  r="8"   fill="#8A4220" opacity="0.7"/>

  <!-- Sobrancelhas (finas, arqueadas) -->
  <path d="M 155 211 Q 170 204 186 210" stroke="#5A2808" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <path d="M 214 210 Q 230 204 245 211" stroke="#5A2808" stroke-width="2.6" fill="none" stroke-linecap="round"/>

  <!-- Olhos brancos -->
  <ellipse cx="170" cy="232" rx="14" ry="9.5" fill="#F8F4F0"/>
  <ellipse cx="230" cy="232" rx="14" ry="9.5" fill="#F8F4F0"/>

  <!-- Íris (verde-acinzentado) -->
  <circle cx="170" cy="233" r="6.8" fill="#4A6040"/>
  <circle cx="230" cy="233" r="6.8" fill="#4A6040"/>

  <!-- Brilho olho -->
  <circle cx="173" cy="230" r="2.2" fill="white" opacity="0.80"/>
  <circle cx="233" cy="230" r="2.2" fill="white" opacity="0.80"/>

  <!-- Cílios -->
  <path d="M 156 222 Q 170 218 184 222" stroke="#3A1808" stroke-width="1.6" fill="none" stroke-linecap="round"/>
  <path d="M 216 222 Q 230 218 244 222" stroke="#3A1808" stroke-width="1.6" fill="none" stroke-linecap="round"/>

  <!-- Nariz (delicado) -->
  <path d="M 197 255 Q 192 268 200 271 Q 208 268 203 255" stroke="#C09070" stroke-width="1.3" fill="none" opacity="0.55"/>
  <ellipse cx="193" cy="270" rx="4.5" ry="3" fill="#C09070" opacity="0.18"/>
  <ellipse cx="207" cy="270" rx="4.5" ry="3" fill="#C09070" opacity="0.18"/>

  <!-- Lábios (coral suave) -->
  <path d="M 183 292 Q 192 287 200 289 Q 208 287 217 292" stroke="#B06848" stroke-width="1.5" fill="none"/>
  <path d="M 183 292 Q 200 306 217 292" fill="#D08868" opacity="0.85"/>
  <path d="M 183 292 Q 200 306 217 292" stroke="#B06848" stroke-width="0.9" fill="none"/>

  <!-- Canalinho -->
  <path d="M 200 271 L 200 289" stroke="#C09070" stroke-width="0.9" fill="none" opacity="0.28"/>

  <!-- Levíssimo rubor nas bochechas -->
  <ellipse cx="155" cy="268" rx="22" ry="12" fill="#D09080" opacity="0.12"/>
  <ellipse cx="245" cy="268" rx="22" ry="12" fill="#D09080" opacity="0.12"/>
</svg>
