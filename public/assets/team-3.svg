<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Retrato 3 — Homem, pele negra, cabelo curto, barba discreta -->

  <!-- Corpo / roupa (terno) -->
  <rect x="0" y="388" width="400" height="160" fill="#282430"/>
  <ellipse cx="200" cy="388" rx="200" ry="42" fill="#282430"/>
  <!-- Lapelas do terno -->
  <path d="M 200 388 L 155 388 L 135 440 L 200 418 L 265 440 L 245 388 Z" fill="#1E1A28"/>
  <!-- Gravata / camisa -->
  <rect x="192" y="390" width="16" height="80" rx="4" fill="#C9A84C" opacity="0.9"/>
  <path d="M 192 390 L 200 406 L 208 390" fill="#A88030"/>

  <!-- Pescoço -->
  <rect x="180" y="310" width="40" height="85" rx="9" fill="#7A4A2A"/>

  <!-- Orelhas -->
  <ellipse cx="121" cy="248" rx="15" ry="20" fill="#6A3E20"/>
  <ellipse cx="279" cy="248" rx="15" ry="20" fill="#6A3E20"/>

  <!-- Rosto (mais quadrado / masculino) -->
  <path d="M 118 222 Q 118 288 148 320 Q 200 340 252 320 Q 282 288 282 222 Q 282 160 200 148 Q 118 160 118 222 Z" fill="#7A4A2A"/>

  <!-- Sombra queixo -->
  <ellipse cx="200" cy="322" rx="52" ry="13" fill="#5A3218" opacity="0.28"/>

  <!-- Barba (sombra discreta) -->
  <path d="M 145 295 Q 200 335 255 295 Q 262 318 254 340 Q 200 358 146 340 Q 138 318 145 295 Z" fill="#0C0808" opacity="0.30"/>
  <path d="M 165 296 Q 200 316 235 296" stroke="#0C0808" stroke-width="1" fill="none" opacity="0.18"/>

  <!-- Bigode -->
  <path d="M 178 292 Q 200 300 222 292" fill="#0C0808" opacity="0.28"/>

  <!-- Cabelo curto -->
  <ellipse cx="200" cy="152" rx="86" ry="72" fill="#0C0808"/>
  <!-- Fade nas laterais (degradê curto) -->
  <ellipse cx="122" cy="205" rx="22" ry="50" fill="#0C0808"/>
  <ellipse cx="278" cy="205" rx="22" ry="50" fill="#0C0808"/>
  <!-- Linha do cabelo natural (irregular) -->
  <path d="M 118 198 Q 130 168 160 152 Q 200 140 240 152 Q 270 168 282 198" stroke="#1A1010" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Sobrancelhas (espessas) -->
  <path d="M 150 213 Q 170 205 190 212" stroke="#0C0808" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <path d="M 210 212 Q 230 205 250 213" stroke="#0C0808" stroke-width="4.5" fill="none" stroke-linecap="round"/>

  <!-- Olhos brancos -->
  <ellipse cx="170" cy="233" rx="15" ry="10" fill="#F0EAE2"/>
  <ellipse cx="230" cy="233" rx="15" ry="10" fill="#F0EAE2"/>

  <!-- Íris (castanho escuro) -->
  <circle cx="170" cy="234" r="7.5" fill="#1C0C06"/>
  <circle cx="230" cy="234" r="7.5" fill="#1C0C06"/>

  <!-- Brilho -->
  <circle cx="173" cy="231" r="2.8" fill="white" opacity="0.72"/>
  <circle cx="233" cy="231" r="2.8" fill="white" opacity="0.72"/>

  <!-- Cílios (mais espessos) -->
  <path d="M 155 223 Q 170 218 185 223" stroke="#0C0808" stroke-width="2.0" fill="none" stroke-linecap="round"/>
  <path d="M 215 223 Q 230 218 245 223" stroke="#0C0808" stroke-width="2.0" fill="none" stroke-linecap="round"/>

  <!-- Nariz (mais largo) -->
  <path d="M 194 255 Q 188 271 200 274 Q 212 271 206 255" stroke="#5A3018" stroke-width="1.6" fill="none" opacity="0.65"/>
  <ellipse cx="190" cy="273" rx="6"   ry="4"   fill="#5A3018" opacity="0.25"/>
  <ellipse cx="210" cy="273" rx="6"   ry="4"   fill="#5A3018" opacity="0.25"/>

  <!-- Lábios (mais definidos) -->
  <path d="M 180 295 Q 192 289 200 291 Q 208 289 220 295" stroke="#5A3018" stroke-width="1.8" fill="none"/>
  <path d="M 180 295 Q 200 310 220 295" fill="#8A5035" opacity="0.80"/>
  <path d="M 180 295 Q 200 310 220 295" stroke="#5A3018" stroke-width="1.0" fill="none"/>

  <!-- Canalinho -->
  <path d="M 200 274 L 200 291" stroke="#5A3018" stroke-width="1.0" fill="none" opacity="0.35"/>
</svg>
